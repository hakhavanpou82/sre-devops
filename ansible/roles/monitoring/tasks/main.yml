- name: Install git
  apt:
    name: git
    state: present

- name: Clone dockprom repository
  git:
    repo: https://github.com/stefanprodan/dockprom.git
    dest: /opt/dockprom
    force: yes

- name: Expose node-exporter port 9100
  replace:
    path: /opt/dockprom/docker-compose.yml
    regexp: '(container_name: nodeexporter\n)'
    replace: "container_name: nodeexporter\n    ports:\n      - \"9100:9100\"\n"

- name: Expose grafana port 3000
  replace:
    path: /opt/dockprom/docker-compose.yml
    regexp: '(container_name: grafana\n)'
    replace: "container_name: grafana\n    ports:\n      - \"3000:3000\"\n"

- name: Stop caddy container
  shell: docker compose stop caddy
  args:
    chdir: /opt/dockprom
  ignore_errors: yes

- name: Start dockprom stack without caddy
  shell: docker compose up -d --scale caddy=0
  args:
    chdir: /opt/dockprom
